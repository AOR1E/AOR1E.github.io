  <div class="graph-header">
    <h3 class="graph-title">我的人际关系</h3>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
(function() {
  var container = document.getElementById("relation-graph");
  var tooltip = document.getElementById("graph-tooltip");

  // ──────────────────────────────────────────────
  // 1. 配置常量
  // ──────────────────────────────────────────────
  var palette = [
    "#7b95c6","#49c2d9","#a1d8e8","#67a583",
    "#a2c986","#d0e2c0","#fded95","#ffc1a6",
    "#f59c7c","#f47254","#c85e62"
  ];

  // 距离层级 → 节点大小映射（可在此统一调整）
  var radiusMap = {
    close:  26,
    normal: 22,
    distant: 18
  };

  // ──────────────────────────────────────────────
  // 2. 从 Jekyll 数据源读取
  // ──────────────────────────────────────────────
  var distanceTiers = {
    
    "close": 130,
    
    "normal": 200,
    
    "distant": 220
    
  };

  var periods = [
    
    { id: "highschool", name: "高中" },
    
    { id: "university", name: "大学" }
    
  ];

  var centerNode = { id: "center", label: "我", isCenter: true };

  var people = [
    
    {
      id: "p1",
      name: "QHY",
      period: "highschool",
      type: "挚友",
      distance: "close",
      desc: "原岁并谢，与友同行"
    },
    
    {
      id: "p2",
      name: "FXY",
      period: "highschool",
      type: "发小",
      distance: "close",
      desc: "梅子青，故人离"
    },
    
    {
      id: "p3",
      name: "XX",
      period: "highschool",
      type: "朋友(决裂)",
      distance: "distance",
      desc: "茕茕白兔，东走西顾"
    },
    
    {
      id: "p4",
      name: "YYH",
      period: "highschool",
      type: "挚友",
      distance: "close",
      desc: "嬉笑怒骂常欢聚，诗词歌赋有惊云"
    },
    
    {
      id: "p5",
      name: "YJ",
      period: "university",
      type: "室友",
      distance: "normal",
      desc: "7-225"
    },
    
    {
      id: "p6",
      name: "JWJ",
      period: "university",
      type: "室友",
      distance: "normal",
      desc: "7-225"
    },
    
    {
      id: "p7",
      name: "CHY",
      period: "university",
      type: "室长",
      distance: "normal",
      desc: "7-225"
    },
    
    {
      id: "p8",
      name: "LMX",
      period: "university",
      type: "学生会同窗",
      distance: "close",
      desc: "世界纵然不会为此而停，但增添，你美丽------祝你在墨尔本留学愉快"
    },
    
    {
      id: "p9",
      name: "LYX",
      period: "university",
      type: "学生会同窗",
      distance: "close",
      desc: "暂歇棹，养万里风；盏盏灯，照后来峰"
    },
    
    {
      id: "p10",
      name: "HFH",
      period: "university",
      type: "学生会同窗",
      distance: "close",
      desc: "铁龙踏破长安雪，从此天涯不转弯"
    },
    
    {
      id: "p11",
      name: "TFJR",
      period: "university",
      type: "学生会同窗",
      distance: "close",
      desc: "未向书中觅封侯，江湖自有剑横秋"
    },
    
    {
      id: "p12",
      name: "LZL",
      period: "university",
      type: "学生会同窗",
      distance: "close",
      desc: "幽兰在谷，静水生香"
    },
    
    {
      id: "p13",
      name: "QHY",
      period: "university",
      type: "兄弟（决裂）",
      distance: "distance",
      desc: "时风已钝，且祝你长青"
    },
    
    {
      id: "p14",
      name: "QHY",
      period: "university",
      type: "朋友",
      distance: "normal",
      desc: "起火 堆山 登高 死亡"
    },
    
    {
      id: "p15",
      name: "YD",
      period: "university",
      type: "兄弟",
      distance: "close",
      desc: "很喜欢和你打CSGO"
    },
    
    {
      id: "p16",
      name: "SSQ",
      period: "university",
      type: "知己",
      distance: "close",
      desc: "Maiden，your simplicity，like the buleness of the lake,reveals your depth of truth"
    },
    
    {
      id: "p17",
      name: "HXC",
      period: "university",
      type: "知己",
      distance: "close",
      desc: "严浩翔老婆啦"
    }
    
  ];

  // ──────────────────────────────────────────────
  // 3. 状态 & 渲染函数
  // ──────────────────────────────────────────────
  var svg, simulation, linkLine, linkLabel, nodeGroup;

  function render(filter) {
    container.innerHTML = "<div class=\"graph-tooltip\" id=\"graph-tooltip\"></div>";
    tooltip = document.getElementById("graph-tooltip");

    // 过滤
    var filtered = filter === "all"
      ? people
      : people.filter(function(p) { return p.period === filter; });

    if (filtered.length === 0) {
      container.innerHTML += "<div class=\"graph-empty\">该时期暂无人际关系数据</div>";
      return;
    }

    // 分配配色
    filtered.forEach(function(p, i) {
      p.color = palette[i % palette.length];
    });

    // 构建节点 & 连线
    var nodes = [centerNode];
    var links = [];
    filtered.forEach(function(p) {
      nodes.push(p);
      // 从 distanceTiers 读取距离像素值，fallback 200
      var dist = distanceTiers[p.distance] || 200;
      var radius = radiusMap[p.distance] || 22;
      p.radius = radius;
      links.push({
        source: "center",
        target: p.id,
        label: p.type,
        dist: dist,
        strength: 1 - (dist - 80) / 400  // 越近强度越大
      });
    });

    // ─── SVG ───
    var width = container.clientWidth || 800;
    var height = container.clientHeight || 560;
    svg = d3.select(container).insert("svg", ".graph-tooltip")
        .attr("viewBox", [0, 0, width, height])
        .style("position", "absolute")
        .style("top", 0).style("left", 0);

    tooltip = document.getElementById("graph-tooltip");
    var defs = svg.append("defs");

    // 阴影滤镜
    defs.append("filter").attr("id","ns").attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%")
      .append("feDropShadow").attr("dx",0).attr("dy",2).attr("stdDeviation",4).attr("flood-opacity",0.18);
    defs.append("filter").attr("id","ns-lg").attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%")
      .append("feDropShadow").attr("dx",0).attr("dy",3).attr("stdDeviation",6).attr("flood-opacity",0.25);

    // 自定义箭头（每根线用自己的颜色）
    defs.selectAll("marker.custom-arrow")
      .data(links)
      .enter().append("marker")
      .attr("class","custom-arrow")
      .attr("id", function(d,i) { return "arrow-" + i; })
      .attr("viewBox","0 -5 10 10")
      .attr("refX", function(d) {
        var tgt = filtered.find(function(p) { return p.id === d.target.id; });
        return tgt ? tgt.radius + 4 : 28;
      })
      .attr("refY", 0)
      .attr("markerWidth", 7)
      .attr("markerHeight", 7)
      .attr("orient", "auto")
      .append("path")
      .attr("fill", function(d) {
        var tgt = filtered.find(function(p) { return p.id === d.target.id; });
        return tgt ? tgt.color : "#999";
      })
      .attr("d", "M0,-5L10,0L0,5");

    // ─── 连线 ───
    var linkGroup = svg.append("g");
    linkLine = linkGroup.selectAll("line").data(links).enter().append("line")
      .attr("stroke", function(d) {
        var tgt = filtered.find(function(p) { return p.id === d.target.id; });
        return tgt ? d3.color(tgt.color).darker(0.2).formatHex() : "#999";
      })
      .attr("stroke-width", 2.2)
      .attr("stroke-opacity", 0.6)
      .attr("marker-end", function(d,i) { return "url(#arrow-" + i + ")"; });

    linkLabel = linkGroup.selectAll(".link-label").data(links).enter().append("text")
      .attr("class","link-label")
      .attr("dy", "-8")
      .text(function(d) { return d.label; });

    // ─── 节点 ───
    nodeGroup = svg.append("g").selectAll("g").data(nodes).enter().append("g")
      .style("cursor","grab")
      .style("opacity", 0);

    nodeGroup.append("circle")
      .attr("r", function(d) { return d.isCenter ? 30 : d.radius; })
      .attr("fill", function(d) { return d.isCenter ? "#2c3e50" : d.color; })
      .attr("stroke", "#fff")
      .attr("stroke-width", 3)
      .attr("filter", function(d) { return d.isCenter ? "url(#ns-lg)" : "url(#ns)"; });

    nodeGroup.filter(function(d) { return d.isCenter; })
      .append("text").attr("class","center-label").text(function(d) { return d.label; });

    nodeGroup.filter(function(d) { return !d.isCenter; })
      .append("text").attr("class","node-label")
      .attr("dy", function(d) { return d.radius + 14; })
      .text(function(d) { return d.name; });

    nodeGroup.transition().duration(400).style("opacity", 1);

    // ─── 悬停 ───
    nodeGroup.filter(function(d) { return !d.isCenter; })
      .on("mouseenter", function(ev, d) {
        d3.select(this).select("circle")
          .transition().duration(200).attr("r", d.radius + 4).attr("filter","url(#ns-lg)");
        d3.select(this).select("text.node-label")
          .transition().duration(200).attr("dy", d.radius + 18).style("font-weight","700");
        tooltip.style.opacity = 1;
        tooltip.innerHTML = "<span class=\"tt-name\">" + d.name + "</span>" +
          (d.desc ? "<br><span class=\"tt-desc\">" + d.desc + "</span>" : "");
      })
      .on("mousemove", function(ev) {
        var rect = container.getBoundingClientRect();
        tooltip.style.left = Math.min(ev.clientX - rect.left + 16, width - 180) + "px";
        tooltip.style.top  = Math.max(ev.clientY - rect.top - 36, 8) + "px";
      })
      .on("mouseleave", function(ev, d) {
        d3.select(this).select("circle")
          .transition().duration(200).attr("r", d.radius).attr("filter","url(#ns)");
        d3.select(this).select("text.node-label")
          .transition().duration(200).attr("dy", d.radius + 14).style("font-weight","500");
        tooltip.style.opacity = 0;
      });

    // ─── 拖拽 ───
    var dragHandler = d3.drag()
      .on("start", function(ev, d) {
        if (!ev.active) simulation.alphaTarget(0.3).restart();
        d.fx = d.x; d.fy = d.y;
        d3.select(this).style("cursor","grabbing");
        d3.select(this).select("circle")
          .transition().duration(150)
          .attr("filter","url(#ns-lg)")
          .attr("r", function(n) { return n.isCenter ? 32 : (n.radius + 2); });
      })
      .on("drag", function(ev, d) { d.fx = ev.x; d.fy = ev.y; })
      .on("end", function(ev, d) {
        if (!ev.active) simulation.alphaTarget(0);
        d.fx = null; d.fy = null;
        d3.select(this).style("cursor","grab");
        d3.select(this).select("circle")
          .transition().duration(300)
          .attr("filter", function(n) { return n.isCenter ? "url(#ns-lg)" : "url(#ns)"; })
          .attr("r", function(n) { return n.isCenter ? 30 : n.radius; });
      });
    nodeGroup.call(dragHandler);

    // ─── Force Simulation ───
    simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(function(d) { return d.id; })
        .distance(function(d) { return d.dist; })
        .strength(function(d) { return d.strength; }))
      .force("charge", d3.forceManyBody().strength(-400))
      .force("center", d3.forceCenter(width / 2, height / 2))
      .force("collision", d3.forceCollide().radius(function(d) {
        return d.isCenter ? 35 : ((d.radius || 22) + 8);
      }))
      .alphaDecay(0.025)
      .on("tick", ticked);
  }

  function ticked() {
    linkLine
      .attr("x1", function(d) { return d.source.x; })
      .attr("y1", function(d) { return d.source.y; })
      .attr("x2", function(d) { return d.target.x; })
      .attr("y2", function(d) { return d.target.y; });

    linkLabel
      .attr("x", function(d) { return d.source.x * 0.4 + d.target.x * 0.6; })
      .attr("y", function(d) { return d.source.y * 0.4 + d.target.y * 0.6; });

    nodeGroup.attr("transform", function(d) {
      return "translate(" + d.x + "," + d.y + ")";
    });
  }

  // ──────────────────────────────────────────────
  // 4. 控制按钮
  // ──────────────────────────────────────────────
  var controlsEl = document.getElementById("graph-controls");
  var btnAll = document.createElement("button");
  btnAll.className = "filter-btn active";
  btnAll.textContent = "所有关系";
  btnAll.onclick = function() { switchFilter("all"); };
  controlsEl.appendChild(btnAll);

  periods.forEach(function(p) {
    var btn = document.createElement("button");
    btn.className = "filter-btn";
    btn.textContent = p.name;
    btn.dataset.period = p.id;
    btn.onclick = function() { switchFilter(p.id); };
    controlsEl.appendChild(btn);
  });

  function switchFilter(filter) {
    var btns = controlsEl.querySelectorAll(".filter-btn");
    btns.forEach(function(b) { b.classList.remove("active"); });
    if (filter === "all") {
      btns[0].classList.add("active");
    } else {
      controlsEl.querySelector('[data-period="' + filter + '"]').classList.add("active");
    }
    render(filter);
  }

  // ──────────────────────────────────────────────
  // 5. 初始渲染
  // ──────────────────────────────────────────────
  render("all");
})();
</script>

    <script>
      (function() {
        var btn = document.getElementById("theme-toggle");
        var icon = document.getElementById("theme-icon");
        var html = document.documentElement;

        function setTheme(theme) {
          if (theme === "dark") {
            html.setAttribute("data-theme", "dark");
            icon.textContent = "☀️";
          } else {
            html.removeAttribute("data-theme");
            icon.textContent = "🌙";
          }
          try { localStorage.setItem("theme", theme); } catch(e) {}
        }

        // sync icon on load
        if (html.getAttribute("data-theme") === "dark") {
          icon.textContent = "☀️";
        }

        btn.addEventListener("click", function() {
          var current = html.getAttribute("data-theme") === "dark" ? "dark" : "light";
          setTheme(current === "dark" ? "light" : "dark");
        });

        // follow system when no manual preference
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        mq.addEventListener("change", function(e) {
          if (!localStorage.getItem("theme")) {
            setTheme(e.matches ? "dark" : "light");
          }
        });
      })();
    </script><script>
  function strip(str, remove) {
    while (str.length > 0 && remove.indexOf(str.charAt(0)) != -1) {
      str = str.substr(1);
    }
    while (str.length > 0 && remove.indexOf(str.charAt(str.length - 1)) != -1) {
      str = str.substr(0, str.length - 1);
    }
    return str;
  }

  function scroll() {
    console.log('scroll');
    window.scrollTo({
      left: 0, 
      top: window.innerHeight,
      behavior: 'smooth'
    });
    sessionStorage.removeItem('forceCheckScroll');
  }

  const forceCheckScroll = sessionStorage.getItem('forceCheckScroll') === 'true';
  const checkScroll = strip(window.location.pathname, '/') !== strip('', '/');

  if (forceCheckScroll || checkScroll) {
    const maxWidth = "(max-width: 48rem)";
    const result = window.matchMedia(maxWidth);
    if (result.matches) {
      scroll();
    } else {
      result.addListener((match) => {
        if (match.media == maxWidth) {
          if (match.matches) {
            scroll();
          }
        }
      });
    }
  }
</script>
